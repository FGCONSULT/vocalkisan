version: "3.8"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: supply-forecast-node:latest
    environment:
      - PORT=8000
      - DOMAIN=https://viksitdairy2047.in/forcast2050
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/var/www/viksitdairy2047/static:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped
________________________________________
nginx.conf
Save as /var/www/viksitdairy2047/nginx.conf.
server {
    listen 80;
    server_name viksitdairy2047.in www.viksitdairy2047.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name viksitdairy2047.in www.viksitdairy2047.in;

    ssl_certificate /etc/letsencrypt/live/viksitdairy2047.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viksitdairy2047.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Serve frontend static files
    root /var/www/viksitdairy2047/static;
    index index.html;

    # Proxy API requests to Node.js
    location /app/ {
        proxy_pass http://web:8000/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
